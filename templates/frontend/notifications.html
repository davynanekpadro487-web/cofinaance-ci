{% extends 'frontend/base.html' %}

{% block title %}Notifications — COFINANCE CI{% endblock %}

{% block extra_css %}
<style>
    .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
    }

    .page-header h1 {
        font-size: 24px;
        color: var(--primary-dark);
        font-weight: 700;
    }

    .card {
        background: var(--white);
        border-radius: 12px;
        box-shadow: var(--card-shadow);
        padding: 24px;
    }

    .notification-item {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        padding: 20px;
        border-bottom: 1px solid #edf2f7;
        transition: var(--transition);
        position: relative;
    }

    .notification-item:last-child {
        border-bottom: none;
    }

    .notification-item.non-lu {
        background: rgba(26, 60, 94, 0.02);
        border-left: 4px solid var(--accent);
    }

    .notification-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        flex-shrink: 0;
    }

    .notification-icon.info { background: rgba(26, 60, 94, 0.1); color: var(--primary); }
    .notification-icon.success { background: rgba(46, 204, 113, 0.1); color: #2ecc71; }
    .notification-icon.warning { background: rgba(241, 196, 15, 0.1); color: #f1c40f; }

    .notification-body {
        flex: 1;
    }

    .notification-text {
        font-size: 14px;
        color: var(--text-dark);
        line-height: 1.5;
        margin-bottom: 4px;
    }

    .notification-time {
        font-size: 11px;
        color: var(--text-muted);
    }

    .notification-action {
        flex-shrink: 0;
    }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Mes Notifications</h1>
    <button class="btn-action accent" onclick="markAllAsRead()">
        <i class="fa-solid fa-check-double"></i> Tout marquer comme lu
    </button>
</div>

<div class="card">
    <div id="notifications-list">
        <p style="text-align: center; color: var(--text-muted); padding: 20px;">Chargement des notifications...</p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        loadNotifications();
    });

    async function loadNotifications() {
        try {
            const data = await apiCall('GET', '/api/notifications/');
            const container = document.getElementById('notifications-list');
            container.innerHTML = '';

            if (!data || data.length === 0) {
                container.innerHTML = `<p style="text-align: center; color: var(--text-muted); padding: 20px;">Aucune notification pour le moment.</p>`;
                return;
            }

            data.forEach(n => {
                const div = document.createElement('div');
                div.className = `notification-item ${n.est_lu ? '' : 'non-lu'}`;
                
                // Determine icon based on message content
                let iconClass = 'fa-info';
                let iconTheme = 'info';
                const lowerText = n.message.toLowerCase();
                
                if (lowerText.includes('approuv') || lowerText.includes('valid') || lowerText.includes('succès')) {
                    iconClass = 'fa-check';
                    iconTheme = 'success';
                } else if (lowerText.includes('paye') || lowerText.includes('rembours')) {
                    iconClass = 'fa-money-bill-wave';
                    iconTheme = 'success';
                } else if (lowerText.includes('rejet') || lowerText.includes('alert') || lowerText.includes('échou')) {
                    iconClass = 'fa-triangle-exclamation';
                    iconTheme = 'warning';
                }

                div.innerHTML = `
                    <div class="notification-icon ${iconTheme}">
                        <i class="fa-solid ${iconClass}"></i>
                    </div>
                    <div class="notification-body">
                        <p class="notification-text"><strong>${n.message}</strong></p>
                        <span class="notification-time">${new Date(n.date_creation).toLocaleString('fr-FR')}</span>
                    </div>
                    ${n.est_lu ? '' : `
                        <div class="notification-action">
                            <button class="btn-action" style="padding: 4px 8px; font-size:11px;" onclick="markAsRead(${n.id})">
                                Lu
                            </button>
                        </div>
                    `}
                `;
                container.appendChild(div);
            });
        } catch (error) {
            console.error('Failed to load notifications:', error);
        }
    }

    async function markAsRead(notifId) {
        try {
            // Note: endpoint might use trailing slash or not depending on urls.py, usually Django expects trailing slashes
            const res = await apiCall('POST', `/api/notifications/${notifId}/lire/`);
            if (res) {
                loadNotifications();
            }
        } catch (error) {
            console.error('Failed to mark notification as read:', error);
        }
    }

    async function markAllAsRead() {
        try {
            const res = await apiCall('POST', '/api/notifications/tout-lire/');
            if (res) {
                alert('Toutes les notifications ont été marquées comme lues.');
                loadNotifications();
            }
        } catch (error) {
            alert('Erreur: ' + error.message);
        }
    }
</script>
{% endblock %}
